<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header{
            position: relative;
            height: 800px;
            background-color: rgb(45, 105, 105);
        }
        div{
            position: absolute;
        }
        .left{
            top:0;
            left: 0;
            border-left: 50vw solid pink;
            border-top: 400px solid transparent;
            border-bottom: 400px solid transparent;
        }
        .right{
            top:0;
            right: 0;
            border-right: 50vw solid pink;
            border-top: 400px solid transparent;
            border-bottom: 400px solid transparent;
        }
    </style>
</head>
<body>
    <header>
        <div class="left"></div>
        <div class="right"></div>
    </header>
</body>
</html>
